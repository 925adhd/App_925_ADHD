<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://img1.wsimg.com/isteam/ip/e5c52ac6-7189-421d-9701-bbc6d6a027fc/SmartSelect_20241218_055052_Gallery.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>925 ADHD</title>
    <!-- Prevent theme flash: apply saved/preferred theme before React loads -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        if (saved === 'light') {
          document.documentElement.classList.add('light');
        } else if (!saved) {
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (!prefersDark) document.documentElement.classList.add('light');
        }
      })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
